<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Florida 2026">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Florida 2026 · Co-Piloto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efe8;
    --text2: #9997a8;
    --text3: #5a5870;
    --accent: #6c63ff;
    --accent2: #9d97ff;
    --gold: #f5c842;
    --gold2: #fad96e;
    --green: #3ecf8e;
    --red: #f56565;
    --orange: #f6914d;
    --font: 'DM Sans', sans-serif;
    --mono: 'Space Mono', monospace;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status-dot.thinking { background: var(--gold); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── QUICK ACTIONS ── */
  #quick-actions {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  #quick-actions::-webkit-scrollbar { display: none; }

  .quick-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .quick-btn:active { background: var(--bg3); transform: scale(0.97); }
  .quick-btn .icon { font-size: 14px; }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── MESSAGE BUBBLES ── */
  .msg { display: flex; gap: 10px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }
  .msg.agent .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--gold)); }
  .msg.user .msg-avatar { background: var(--bg3); border: 1px solid var(--border2); }

  .msg-content { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 11px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }

  .msg.agent .msg-bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    border-bottom-right-radius: 4px;
    color: #fff;
  }

  .msg-bubble strong { color: var(--gold2); font-weight: 600; }
  .msg.user .msg-bubble strong { color: #fff; font-weight: 700; }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    padding: 0 4px;
  }

  /* ── CARDS ESPECIAIS ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 8px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }
  .badge-live { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  .badge-alert { background: rgba(245,101,101,0.15); color: var(--red); border: 1px solid rgba(245,101,101,0.3); }
  .badge-tip { background: rgba(245,200,66,0.15); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
  .badge-route { background: rgba(108,99,255,0.15); color: var(--accent2); border: 1px solid rgba(108,99,255,0.3); }

  .wait-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .wait-item:last-child { border-bottom: none; }
  .wait-item .attraction { color: var(--text); }
  .wait-time {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .wait-low { background: rgba(62,207,142,0.15); color: var(--green); }
  .wait-med { background: rgba(245,200,66,0.15); color: var(--gold); }
  .wait-high { background: rgba(245,101,101,0.15); color: var(--red); }
  .wait-closed { background: var(--bg3); color: var(--text3); }

  /* ── TYPING INDICATOR ── */
  #typing {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }
  #typing.visible { display: flex; }

  .typing-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .typing-bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── INPUT ── */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  #input-row:focus-within { border-color: var(--accent); }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.5;
  }
  #input::placeholder { color: var(--text3); }

  #send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    color: white;
  }
  #send-btn:active { transform: scale(0.92); background: var(--accent2); }
  #send-btn:disabled { background: var(--bg3); cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
  }

  .setup-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    animation: logoFloat 3s ease-in-out infinite;
  }
  @keyframes logoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  .setup-title {
    text-align: center;
  }
  .setup-title h2 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .setup-title p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
  }

  .setup-field { width: 100%; }
  .setup-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .setup-field input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup-field input:focus { border-color: var(--accent); }
  .setup-field input::placeholder { color: var(--text3); }

  .setup-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #5a52e0);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
  .setup-btn:active { transform: scale(0.98); opacity: 0.9; }

  .setup-hint {
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    line-height: 1.6;
  }

  /* ── DAY BANNER ── */
  .day-banner {
    text-align: center;
    padding: 6px 0;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 481px) {
    #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-logo">🎢</div>
  <div class="setup-title">
    <h2>Florida 2026</h2>
    <p>Seu co-piloto de viagem.<br>Insira sua chave da API para começar.</p>
  </div>
  <div class="setup-field">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
  </div>
  <button class="setup-btn" onclick="saveKey()">Entrar no parque 🚀</button>
  <p class="setup-hint">Sua chave fica salva só no seu celular.<br>Nunca é enviada para nenhum servidor.</p>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="header">
    <div class="header-left">
      <div class="logo">🎢</div>
      <div class="header-info">
        <h1>Florida 2026</h1>
        <p id="header-sub">Co-Piloto · Be, Ju & Você</p>
      </div>
    </div>
    <div id="status-dot"></div>
  </div>

  <div id="quick-actions">
    <button class="quick-btn" onclick="quickAction('Quais são as filas agora no parque de hoje?')">
      <span class="icon">⏱️</span> Filas agora
    </button>
    <button class="quick-btn" onclick="quickAction('Qual a próxima atração do roteiro?')">
      <span class="icon">➡️</span> Próxima atração
    </button>
    <button class="quick-btn" onclick="quickAction('O Be está cansado, o que fazemos agora?')">
      <span class="icon">😴</span> Be cansou
    </button>
    <button class="quick-btn" onclick="quickAction('Tem algum imprevisto ou reforma que devo saber hoje?')">
      <span class="icon">⚠️</span> Imprevistos
    </button>
    <button class="quick-btn" onclick="quickAction('Me conta um hack para o parque de hoje que poucos sabem.')">
      <span class="icon">🎯</span> Hack do dia
    </button>
    <button class="quick-btn" onclick="quickAction('Como funciona o Express Pass da Universal? Compara com o Lightning Lane.')">
      <span class="icon">🎟️</span> Universal 101
    </button>
    <button class="quick-btn" onclick="quickAction('Preciso de ajuda com o app My Disney Experience agora.')">
      <span class="icon">📱</span> App Disney
    </button>
    <button class="quick-btn" onclick="quickAction('Rise of the Resistance quebrou. Recalcula o roteiro de hoje.')">
      <span class="icon">🔄</span> Rota quebrou
    </button>
  </div>

  <div id="messages">
    <div class="day-banner">CO-PILOTO ATIVO · FLORIDA 2026</div>
  </div>

  <div id="typing">
    <div class="typing-avatar">🎢</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="input" placeholder="Pergunta qualquer coisa..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── CONFIGURAÇÃO FAMILIAR COMPLETA ──
const FAMILY_CONTEXT = `
Você é o co-piloto de viagem da família para a viagem à Flórida 2026.

FAMÍLIA:
- Pai (usuário principal do app)
- Ju (mãe, Samsung S24 Ultra)
- Be (filho, 3 anos e meio, 97cm, anda com carrinho)

PERFIL DO BE:
- AMA: Carros (McQueen é paixão), Star Wars, Mickey Roadster Racers, dinossauros, animais
- Não gosta de escuro/ambientes muito fechados mas NÃO deixa de fazer (ex: Na'vi River reclamou mas adorou)
- NUNCA filtrar atrações por causa da idade ou tamanho do Be — sempre informar e deixar os pais decidirem
- Para cada atração, informar a restrição de altura real e se Kids Switch está disponível

PERFIL DOS ADULTOS:
- Experientes em Disney (múltiplas visitas) — não explicar o básico do esquema Disney
- Pouca experiência em Universal (1x Universal Studios, 1x Islands of Adventure, nunca foram no Epic Universe)
- Universal: SEMPRE explicar o sistema proativamente, comparar com Disney: "Express Pass = Lightning Lane Single Pass mas você usa 1x por atração por dia"
- Ambos adultos topam adrenalina total — revezam Kids Switch em tudo
- Ritmo: INTENSO — querem fazer TUDO, acordam às 7h todo dia

DATAS E HOTÉIS:
- 28/04 a 05/05: All Star Movies Resort (HOTEL DISNEY → Early Entry ativo todos os dias)
- 05/05 a 14/05: Monreale Hotel (FORA DA DISNEY → SEM Early Entry — roteiro muda completamente)
- 06/05: Legoland (dia específico para o Be)
- Viagem termina: 14/05/2026

PARQUES DISNEY (1 parque por dia, sem Park Hopper):
- Magic Kingdom
- Hollywood Studios  
- Animal Kingdom
- EPCOT

PARQUES UNIVERSAL (ingresso 14 dias):
- Universal Studios Florida
- Islands of Adventure
- Epic Universe

MUST-HAVES ABSOLUTOS (se não acontecer = tragédia):
1. 04/05 = Hollywood Studios obrigatório (May the 4th be with you)
   - Savi's Workshop (sabre de luz) — RESERVA OBRIGATÓRIA no app My Disney Experience, abre 60 dias antes. Verificar se já está reservado. Custo ~$299. Kids Switch disponível.
   - McQueen's Racing Academy (Be vai ENLOUQUECER)
   - Ambiente Galaxy's Edge completo
2. Magic Kingdom = Tony's Town Square Restaurant, almoço às 12h, PEDIR MESA NA VARANDA (balcony view) para assistir o fim da parade sentados. Considerar tempo de deslocamento e espera para garantir esse horário.
3. Toadstool Café no Nintendo World (Epic Universe) — reservar com antecedência

MUST-HAVES SECUNDÁRIOS:
- Test Track no EPCOT (Be vai amar — carro de corrida!)
- Millennium Falcon: Smugglers Run (Be pilota a nave)
- Tomorrowland Speedway no Magic Kingdom (Be "dirige")
- Expedition Everest + Kids Switch
- Raptor Encounter no Islands of Adventure (Be adora dinossauros)
- Encontro com Toothless no Epic Universe (animatrônico realista)
- Yoshi's Adventure + Power-Up Bands no Nintendo World

HACKS ATIVOS (o agente deve buscar mais ativamente):
- Tony's Town Square 12h = parade view da varanda
- Estratégia anti-horária em Magic Kingdom (entrar pela esquerda)
- Primeiros 90min após abertura = 40-60% menos fila
- Kali River Rapids no Animal Kingdom com roupa extra
- Butterfly Landing no EPCOT Flower & Garden Festival (borboletas no Be)
- Buscar hacks específicos do parque do dia ANTES de cada visita

REGRAS DO AGENTE:
1. NUNCA filtrar atração por causa da idade/altura do Be — só informar
2. Disney: não explicar o básico. Universal: explicar TUDO proativamente
3. Se algo quebrar (atração fechada, fila explodiu), recalcular rota imediatamente
4. Sempre considerar que Be tem carrinho — informar se atração/área é carrinho-friendly
5. Para cada sugestão, incluir: o que fazer no APP (Disney Experience ou Universal app)
6. Priorizar experiências do Be mas nunca sacrificar experiência adulto sem Kids Switch
7. May the 4th (04/05) = Hollywood Studios FIXO, não mover
8. Savi's Workshop: alertar sobre reserva com urgência se não confirmada
9. Buscar hacks e dicas especiais para cada parque antes do dia
10. Quando no Universal: comparar sempre com Disney para contextualizar

EARLY ENTRY (só quando hospedados no All Star Movies — até 05/05):
- Entrada 30 min antes do horário oficial em qualquer parque Disney
- Magic Kingdom Early Entry: Tomorrowland + Fantasyland abertas
- Hollywood Studios Early Entry: Rise of the Resistance + Runaway Railway
- Animal Kingdom Early Entry: Flight of Passage (prioridade máxima)
- EPCOT Early Entry: Guardians of the Galaxy + Test Track

LEGOLAND (06/05 — dia específico do Be):
- Parque focado em crianças 2-12 anos — Be é o público exato
- Principais para o Be: LEGO City, Duplo Valley (bebês/crianças pequenas), The Dragon coaster
- Chegada: 10h (abre às 10h), saída: por volta das 17h (Be vai esgotar)
- Sem Early Entry disponível para vocês

CLIMA ORLANDO MAIO:
- Temperatura: 27-32°C, úmido
- Chuvas: rápidas e intensas à tarde (14h-16h), passam rápido
- Estratégia: atrações ao ar livre de manhã, indoor de tarde durante chuva

RESPONDA SEMPRE:
- Em português do Brasil
- De forma direta, objetiva e prática
- Com a próxima ação concreta (o que fazer AGORA)
- Incluindo instrução do app quando relevante
- Sem floreios ou introduções longas
- Máximo 3-4 parágrafos por resposta (no celular, espaço é valioso)
- Use emojis com moderação para facilitar escaneamento rápido
`;

// ── ESTADO ──
let apiKey = '';
let messages = [];
let isLoading = false;
let currentPark = null;

// ── INIT ──
window.addEventListener('load', () => {
  const saved = localStorage.getItem('florida_api_key');
  if (saved) {
    apiKey = saved;
    document.getElementById('setup-screen').style.display = 'none';
    initApp();
  }

  const input = document.getElementById('input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    document.getElementById('send-btn').disabled = input.value.trim() === '' || isLoading;
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading && input.value.trim()) sendMessage();
    }
  });
});

function saveKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('Chave inválida. Deve começar com sk-ant-');
    return;
  }
  apiKey = key;
  localStorage.setItem('florida_api_key', key);
  document.getElementById('setup-screen').style.display = 'none';
  initApp();
}

function initApp() {
  setStatus('online');
  const today = new Date();
  const tripStart = new Date('2026-04-28');
  const tripEnd = new Date('2026-05-14');
  
  if (today >= tripStart && today <= tripEnd) {
    const dayNum = Math.floor((today - tripStart) / (1000 * 60 * 60 * 24)) + 1;
    document.getElementById('header-sub').textContent = `Dia ${dayNum} da viagem · Be, Ju & Você`;
    detectTodayPark(today);
  }

  // Mensagem de boas-vindas
  const welcomeMsg = buildWelcomeMessage();
  appendMessage('agent', welcomeMsg);
}

function detectTodayPark(today) {
  const d = today.toISOString().split('T')[0];
  const schedule = {
    '2026-04-28': 'Magic Kingdom',
    '2026-04-29': 'Animal Kingdom', 
    '2026-04-30': 'EPCOT',
    '2026-05-01': 'Hollywood Studios',
    '2026-05-02': 'Magic Kingdom',
    '2026-05-03': 'Universal Studios Florida',
    '2026-05-04': 'Hollywood Studios',
    '2026-05-05': 'Islands of Adventure',
    '2026-05-06': 'Legoland',
    '2026-05-07': 'Epic Universe',
    '2026-05-08': 'Animal Kingdom',
    '2026-05-09': 'EPCOT',
    '2026-05-10': 'Universal Studios Florida',
    '2026-05-11': 'Magic Kingdom',
    '2026-05-12': 'Islands of Adventure',
    '2026-05-13': 'Epic Universe',
    '2026-05-14': 'Hollywood Studios',
  };
  currentPark = schedule[d] || null;
  if (currentPark) {
    document.getElementById('header-sub').textContent = `${currentPark} · Be, Ju & Você`;
  }
}

function buildWelcomeMessage() {
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite';
  
  const today = now.toISOString().split('T')[0];
  const isMay4 = today === '2026-05-04';
  const isLegoland = today === '2026-05-06';
  
  if (isMay4) {
    return `⚔️ **MAY THE 4TH BE WITH YOU!**\n\nHoje é o dia mais especial da viagem — Hollywood Studios está esperando vocês.\n\n**Checklist urgente:**\n• Savi's Workshop reservado? Se não, abra o app agora\n• McQueen's Racing Academy: primeiro horário disponível\n• Galaxy's Edge: chegue no rope drop\n\nO que posso te ajudar agora?`;
  }
  
  if (isLegoland) {
    return `🧱 **Dia do Be no Legoland!**\n\nHoje é o dia mais focado no Be da viagem inteira — o parque foi feito pra ele.\n\n**Prioridades:** Duplo Valley (crianças pequenas), LEGO City, The Dragon. Chegada às 10h na abertura.\n\nO que quer saber?`;
  }

  if (currentPark) {
    return `${greeting}! 🎢 Hoje é dia de **${currentPark}**.\n\nEstou pronto pra te ajudar com filas, roteiro, hacks e imprevistos. Use os botões rápidos acima ou me pergunta qualquer coisa.\n\nQuer o briefing completo do dia?`;
  }

  return `${greeting}! 🎢 Bem-vindo ao **Co-Piloto Florida 2026**.\n\nEstou carregado com tudo sobre a viagem: roteiro, perfil do Be, must-haves, hacks dos parques e como navegar a Universal do zero.\n\nComo posso te ajudar?`;
}

// ── FETCH FILAS ──
async function fetchWaitTimes(parkName) {
  const parkIds = {
    'Magic Kingdom': 'magic-kingdom',
    'EPCOT': 'epcot',
    'Hollywood Studios': 'hollywood-studios',
    'Animal Kingdom': 'animal-kingdom',
    'Universal Studios Florida': 'universal-studios-florida',
    'Islands of Adventure': 'islands-of-adventure',
    'Epic Universe': 'universal-epic-universe',
    'Legoland': 'legoland-florida',
  };

  const slug = parkIds[parkName];
  if (!slug) return null;

  try {
    const res = await fetch(`https://queue-times.com/parks/${slug}/queue_times.json`);
    if (!res.ok) return null;
    const data = await res.json();
    return data;
  } catch {
    return null;
  }
}

function formatWaitData(data, parkName) {
  if (!data || !data.lands) return null;
  
  const allRides = [];
  for (const land of data.lands) {
    for (const ride of land.rides) {
      allRides.push({
        name: ride.name,
        wait: ride.wait_time,
        open: ride.is_open,
        land: land.name,
      });
    }
  }

  allRides.sort((a, b) => {
    if (!a.open && b.open) return 1;
    if (a.open && !b.open) return -1;
    return b.wait - a.wait;
  });

  const top = allRides.slice(0, 8);
  let html = `<div class="card">
    <div class="card-header">
      <span class="card-badge badge-live">● AO VIVO</span>
      <span style="font-size:13px;color:var(--text2);font-weight:500">${parkName}</span>
    </div>`;
  
  for (const ride of top) {
    const waitClass = !ride.open ? 'wait-closed' : ride.wait <= 20 ? 'wait-low' : ride.wait <= 45 ? 'wait-med' : 'wait-high';
    const waitText = !ride.open ? 'Fechada' : ride.wait === 0 ? 'Walk-in' : `${ride.wait} min`;
    html += `<div class="wait-item">
      <span class="attraction">${ride.name}</span>
      <span class="wait-time ${waitClass}">${waitText}</span>
    </div>`;
  }
  
  html += `</div>`;
  return html;
}

// ── ENVIAR MENSAGEM ──
async function sendMessage(text) {
  if (isLoading) return;
  
  const input = document.getElementById('input');
  const userText = text || input.value.trim();
  if (!userText) return;

  if (!text) {
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
  }

  appendMessage('user', userText);
  
  // Detectar se pediu filas
  const askedWaitTimes = /fila|espera|wait|tempo|queue/i.test(userText);
  
  setStatus('thinking');
  showTyping(true);

  try {
    // Buscar dados ao vivo se relevante
    let liveData = '';
    if (askedWaitTimes && currentPark) {
      const waitData = await fetchWaitTimes(currentPark);
      if (waitData) {
        const waitSummary = buildWaitSummary(waitData);
        liveData = `\n\nDADOS AO VIVO (${currentPark} — ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}):\n${waitSummary}`;
      }
    }

    // Construir histórico de mensagens
    const historyMessages = messages.slice(-10).map(m => ({
      role: m.role === 'agent' ? 'assistant' : 'user',
      content: m.text
    }));

    historyMessages.push({
      role: 'user',
      content: userText + liveData
    });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: FAMILY_CONTEXT,
        messages: historyMessages
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'Erro na API');
    }

    const data = await response.json();
    const reply = data.content[0].text;

    showTyping(false);
    setStatus('online');

    // Se pediu filas, mostrar card visual também
    if (askedWaitTimes && currentPark) {
      const waitData = await fetchWaitTimes(currentPark);
      if (waitData) {
        const cardHtml = formatWaitData(waitData, currentPark);
        if (cardHtml) {
          appendMessage('agent', reply, cardHtml);
          return;
        }
      }
    }

    appendMessage('agent', reply);

  } catch (err) {
    showTyping(false);
    setStatus('online');
    if (err.message.includes('401') || err.message.includes('authentication')) {
      appendMessage('agent', '🔑 Chave da API inválida ou expirada. Recarrega a página para inserir uma nova chave.');
    } else {
      appendMessage('agent', `⚠️ Não consegui responder agora. Verifique sua conexão e tente novamente.\n\nErro: ${err.message}`);
    }
  }
}

function buildWaitSummary(data) {
  if (!data || !data.lands) return 'Dados não disponíveis';
  
  const lines = [];
  for (const land of data.lands) {
    for (const ride of land.rides) {
      if (ride.is_open) {
        const wait = ride.wait_time === 0 ? 'Walk-in' : `${ride.wait_time}min`;
        lines.push(`${ride.name}: ${wait}`);
      } else {
        lines.push(`${ride.name}: FECHADA`);
      }
    }
  }
  return lines.join('\n');
}

function quickAction(text) {
  sendMessage(text);
}

// ── UI HELPERS ──
function appendMessage(role, text, extraHtml) {
  const msg = { role, text, time: new Date() };
  messages.push(msg);

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'agent' ? '🎢' : '👤';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = msg.time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  content.appendChild(bubble);
  if (extraHtml) {
    const extra = document.createElement('div');
    extra.innerHTML = extraHtml;
    content.appendChild(extra);
  }
  content.appendChild(time);

  div.appendChild(avatar);
  div.appendChild(content);

  // Inserir antes do typing indicator
  const typing = document.getElementById('typing');
  container.insertBefore(div, typing);
  container.scrollTop = container.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:var(--bg3);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:12px">$1</code>')
    .replace(/\n/g, '<br>');
}

function showTyping(show) {
  const t = document.getElementById('typing');
  t.className = show ? 'typing visible' : 'typing';
  if (show) {
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }
}

function setStatus(state) {
  isLoading = state === 'thinking';
  const dot = document.getElementById('status-dot');
  dot.className = state === 'thinking' ? 'thinking' : state === 'online' ? 'online' : '';
  document.getElementById('send-btn').disabled = isLoading;
}
</script>
