<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Florida 2026">
<meta name="theme-color" content="#0a0a0f">
<title>Florida 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0a0f;color:#f0efe8;font-family:'DM Sans',sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

#hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#6c63ff,#f5c842);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;color:#5a5870;font-family:'Space Mono',monospace}
#dot{width:8px;height:8px;border-radius:50%;background:#3ecf8e;box-shadow:0 0 6px #3ecf8e;transition:all .3s}
#dot.busy{background:#f5c842;box-shadow:0 0 6px #f5c842;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

#quick{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);scrollbar-width:none}
#quick::-webkit-scrollbar{display:none}
.qbtn{display:flex;align-items:center;gap:5px;padding:7px 13px;background:#13131a;border:1px solid rgba(255,255,255,0.12);border-radius:20px;color:#9997a8;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.qbtn:active{opacity:.7}

#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}

.msg{display:flex;gap:10px;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;margin-top:2px}
.msg.agent .av{background:linear-gradient(135deg,#6c63ff,#f5c842)}
.msg.user .av{background:#1c1c26;border:1px solid rgba(255,255,255,0.12)}
.mc{max-width:82%;display:flex;flex-direction:column;gap:4px}
.msg.user .mc{align-items:flex-end}
.bbl{padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.agent .bbl{background:#13131a;border:1px solid rgba(255,255,255,0.08);border-bottom-left-radius:4px}
.msg.user .bbl{background:#6c63ff;border-bottom-right-radius:4px;color:#fff}
.bbl strong{color:#fad96e;font-weight:600}
.msg.user .bbl strong{color:#fff}
.bbl code{background:#1c1c26;padding:1px 5px;border-radius:4px;font-family:'Space Mono',monospace;font-size:12px}
.ts{font-size:10px;color:#5a5870;font-family:'Space Mono',monospace;padding:0 4px}

.wcard{background:#1c1c26;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px;margin-top:8px}
.wcard-title{font-size:10px;font-weight:700;color:#3ecf8e;font-family:'Space Mono',monospace;letter-spacing:.05em;margin-bottom:10px}
.wi{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:13px}
.wi:last-child{border-bottom:none}
.wb{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.wl{background:rgba(62,207,142,.15);color:#3ecf8e}
.wm{background:rgba(245,200,66,.15);color:#f5c842}
.wh{background:rgba(245,101,101,.15);color:#f56565}
.wo{background:#13131a;color:#5a5870}

#typ{display:none;gap:10px;padding:0 16px 8px;align-items:center;flex-shrink:0}
#typ.on{display:flex}
.tav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#f5c842);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tbbl{background:#13131a;border:1px solid rgba(255,255,255,0.08);border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.td{width:6px;height:6px;border-radius:50%;background:#5a5870;animation:bounce 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

#inp-area{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:#0a0a0f;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
#inp-row{display:flex;gap:10px;align-items:flex-end;background:#13131a;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:10px 14px;transition:border-color .2s}
#inp-row:focus-within{border-color:#6c63ff}
#inp{flex:1;background:none;border:none;outline:none;color:#f0efe8;font-family:'DM Sans',sans-serif;font-size:15px;resize:none;max-height:120px;min-height:24px;line-height:1.5}
#inp::placeholder{color:#5a5870}
#sbtn{width:34px;height:34px;border-radius:50%;background:#6c63ff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;transition:all .15s}
#sbtn:active{transform:scale(.92)}
#sbtn:disabled{background:#1c1c26;cursor:not-allowed;opacity:.5}
#sbtn svg{width:16px;height:16px}

.daybanner{text-align:center;padding:6px 0;font-size:11px;color:#5a5870;font-family:'Space Mono',monospace;letter-spacing:.05em}
</style>
</head>
<body>

  <div id="msgs">

  <div id="typ">

          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>

sil\n\nMUST-HAVES ABSOLUTOS:\n1. 04/05 May the 4th - Hollywood Studios:\n   - Savis Workshop (sabre de luz): RESERVA OBRIGATORIA no app My Disney Experience (~$299). Se nao reservado, ALERTAR URGENCIA MAXIMA.\n   - McQueens Racing Academy: Be vai enlouquecer\n   - Millennium Falcon Smugglers Run: Be pilota a nave\n2. Magic Kingdom - Tonys Town Square Restaurant:\n   - Almoco as 11h30\n   - PEDIR MESA NA VARANDA (Balcony View) para ver a parade sentados\n   - Reservar no app My Disney Experience com 60 dias de antecedencia\n3. EPCOT - Garden Grill Restaurant: reservar com antecedencia\n4. Epic Universe - Toadstool Cafe (Nintendo World): reservar com antecedencia\n5. Breakfast with Chef Mickey (07/05): reservar com antecedencia no app My Disney Experience\n\nMUST-HAVES SECUNDARIOS:\n- Test Track EPCOT (Be ama carro de corrida)\n- Tomorrowland Speedway Magic Kingdom (Be dirige)\n- Expedition Everest + Kids Switch\n- Raptor Encounter Islands of Adventure (Be adora dinos)\n- Encontro com Toothless Epic Universe\n- Yoshis Adventure + Power-Up Bands Nintendo World\n- Dragon Racers Rally Epic Universe\n- Navi River Journey Animal Kingdom\n\nLEGOLAND 06/05:\n- Publico 2-12 anos - Be e o foco total\n- Prioridades: DUPLO Valley, LEGO City, The Dragon (32 polegadas minimo)\n- Chegada as 10h, saida ~17h\n\nDISNEY BOARDWALK 09/05:\n- Area de entretenimento entre EPCOT e Hollywood Studios\n- Restaurantes, bares, mini-golf, boardwalk a beira do lago\n- Nao precisa de ingresso de parque\n- Otimo para jantar e passear com o Be a noite\n\nALTURAS MINIMAS CRITICAS (sempre informar corretamente):\n- Rise of the Resistance: 102cm\n- TRON Lightcycle Run: 102cm\n- Guardians of the Galaxy Cosmic Rewind: 107cm\n- Slinky Dog Dash: 97cm (Be esta no limite exato!)\n- Millennium Falcon Smugglers Run: 97cm (Be esta no limite exato!)\n- Seven Dwarfs Mine Train: 97cm (Be esta no limite exato!)\n- Space Mountain: 112cm\n- Big Thunder Mountain: 102cm\n- Expedition Everest: 112cm\n- Tower of Terror: 102cm\n- VelociCoaster: 130cm\n- Hagrids Motorbike: 122cm\n- Hollywood Rip Ride Rockit: 130cm\n- Harry Potter Forbidden Journey: 122cm\n- Flight of the Hippogriff: 92cm (Be passa!)\n- Navi River Journey: SEM restricao\n- Kilimanjaro Safaris: SEM restricao\n- Na vida real Be tem 97cm - sempre verificar se atinge o minimo\n\nHACKS:\n- Tonys 11h30 = parade view da varanda (reserva Balcony View)\n- Magic Kingdom: entrar pela esquerda (Tomorrowland) = 40% menos fila\n- Early Entry: primeiros 90min tem 40-60% menos fila (so ate 05/05)\n- Kids Switch: adulto 1 entra, adulto 2 usa passe sem fila\n- Chuvas rapidas em Orlando 14-16h: indoor de tarde\n- Buscar hacks especificos de cada parque do dia\n- Pesquisar filas e desenhar roteiros otimizando tempo\n\nREGRAS:\n1. NUNCA filtrar atracao por tamanho/idade - so informar e deixar decidir\n2. Be AMA McQueen - qualquer coisa de corrida e prioridade emocional\n3. May the 4th = Hollywood Studios FIXO\n4. Savis Workshop = alertar urgencia se nao confirmado\n5. Early Entry so funciona ate 05/05 (All Star Movies)\n6. Universal: explicar tudo proativamente sempre\n7. Se atracao quebrar: recalcular rota com alternativas concretas\n8. Incluir instrucao do app quando relevante\n9. Considerar carrinho do Be\n10. Considerar melhores rotas dentro do parque\n11. Pesquisar filas e otimizar roteiros sempre\n\nSOBRE FILAS: Quando receber dados ao vivo entre colchetes [DADOS AO VIVO], use-os e cite os tempos reais. NUNCA invente tempos de espera.\n\nCLIMA MAIO ORLANDO: 27-32C. Chuvas rapidas 14-16h. Indoor de tarde.\n\nRESPONDA: Portugues do Brasil. Direto e pratico. Proxima acao concreta primeiro. Maximo 4 paragrafos. Emojis moderados.";

var chatHistory = [];
var busy = false;

var PARKS = {
  '2026-04-28': 'Chegada',
  '2026-04-29': 'EPCOT',
  '2026-04-30': 'Magic Kingdom',
  '2026-05-01': 'Rest Day',
  '2026-05-02': 'Animal Kingdom',
  '2026-05-03': 'Rest Day',
  '2026-05-04': 'Hollywood Studios',
  '2026-05-05': 'Troca de Hotel',
  '2026-05-06': 'Legoland',
  '2026-05-07': 'Chef Mickey Breakfast',
  '2026-05-08': 'Islands of Adventure',
  '2026-05-09': 'Disney BoardWalk',
  '2026-05-10': 'Universal Studios Florida',
  '2026-05-11': 'Rest Day',
  '2026-05-12': 'Epic Universe',
  '2026-05-13': 'Epic Universe'
};

var PARK_KEYWORDS = {
  'Hollywood Studios': ['hollywood','rise of the resistance','smugglers run','runaway railway','slinky','tower of terror','galaxy edge','millennium falcon'],
  'Magic Kingdom': ['magic kingdom','tomorrowland','fantasyland','adventureland','big thunder','tron','peter pan','haunted mansion','seven dwarfs'],
  'EPCOT': ['epcot','guardians','ratatouille','frozen ever after','test track','soarin'],
  'Animal Kingdom': ['animal kingdom','pandora','flight of passage','kilimanjaro','everest','navi river'],
  'Universal Studios Florida': ['universal studios florida','minions','gringotts','springfield','diagon alley','rip ride rockit'],
  'Islands of Adventure': ['islands of adventure','hogsmeade','velocicoaster','hagrid','jurassic','spiderman','forbidden journey','hippogriff'],
  'Epic Universe': ['epic universe','nintendo world','mario kart','toothless','isle of berk','ministry of magic','dark universe','yoshi','donkey kong']
};

window.onload = function() {
  var inp = document.getElementById('inp');
  inp.oninput = function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    document.getElementById('sbtn').disabled = this.value.trim() === '' || busy;
  };
  inp.onkeydown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!busy && this.value.trim()) send();
    }
  };

  var today = getToday();
  var park = PARKS[today];
  if (park && park !== 'Rest Day' && park !== 'Chegada' && park !== 'Troca de Hotel') {
    var label = park;
    if (today === '2026-05-04') label = 'Hollywood Studios ⚔️';
    if (today === '2026-05-06') label = 'Legoland 🧱';
    if (today === '2026-05-07') label = 'Chef Mickey 🥞';
    if (today === '2026-05-09') label = 'Disney BoardWalk 🎡';
    document.getElementById('hdr-sub').textContent = label + ' · Família Hoppe';
  }

  setTimeout(function() {
    var h = new Date().getHours();
    var g = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
    var msg = '';
    if (today === '2026-05-04') {
      msg = '⚔️ MAY THE 4TH BE WITH YOU, Família Hoppe!\n\nHoje é o dia mais especial da viagem — Hollywood Studios está esperando vocês.\n\nChecklist urgente:\n• Savi\'s Workshop: horário reservado?\n• McQueen\'s Racing Academy: primeiro horário disponível\n• Millennium Falcon: Be pilota a nave!\n\nO que posso ajudar agora?';
    } else if (today === '2026-05-06') {
      msg = '🧱 Dia do Bernardo no Legoland!\n\nHoje o parque é do Be — foi feito pra ele.\n\nPrioridades: DUPLO Valley primeiro, depois LEGO City e The Dragon. Chegada às 10h.\n\nQuer o briefing completo?';
    } else if (today === '2026-05-07') {
      msg = '🥞 Dia do Breakfast with Chef Mickey!\n\nUma das experiências mais mágicas para o Be — Mickey e turma em pessoa no café da manhã.\n\nReserva confirmada no app My Disney Experience?\n\nQuer ajuda com alguma coisa antes de ir?';
    } else if (today === '2026-04-29') {
      msg = g + '! 🌸 Hoje é EPCOT + Flower & Garden Festival, Fernando!\n\nTopiários do Buzz, Woody, Simba e +60 personagens. O Be vai amar o Butterfly Landing!\n\nGarden Grill Restaurant reservado? Me avisa que ajudo agora.\n\nQuer o roteiro completo?';
    } else if (today === '2026-04-30') {
      msg = g + '! 🏰 Hoje é Magic Kingdom!\n\nLembra do hack do Tony\'s: reserva às 11h30, mesa na varanda (Balcony View) para ver a Parade sentados.\n\nEntrem pela esquerda (Tomorrowland) — 40% menos fila nos primeiros 30 minutos.\n\nQuer o roteiro completo?';
    } else if (today === '2026-05-02') {

    } else if (today === '2026-05-08') {
      msg = g + '! 🦖 Hoje é Islands of Adventure!\n\nPrioridade: Hagrid\'s Motorbike (122cm — Kids Switch) e VelociCoaster (130cm — Kids Switch) logo cedo.\n\nPara o Be: Seuss Landing, Hogsmeade e Flight of the Hippogriff (92cm — Be passa!).\n\nQuer o roteiro completo?';
    } else if (today === '2026-05-09') {
      msg = g + '! 🎡 Dia de descanso + Disney BoardWalk!\n\nSem parque hoje. O BoardWalk à noite é ótimo — sem ingresso, restaurantes à beira do lago, o Be vai adorar.\n\nQuer sugestões do que fazer por lá?';
    } else if (today === '2026-05-10') {
      msg = g + '! 🎬 Hoje é Universal Studios Florida!\n\nPrimeira prioridade: Diagon Alley logo na abertura (Gringotts tem fila enorme depois das 10h).\n\nLembrete: vocês estão no Monreale agora — sem Early Entry Universal. Cheguem na abertura!\n\nQuer o roteiro completo?';
    } else if (today === '2026-05-12' || today === '2026-05-13') {
      var visita = today === '2026-05-12' ? '1ª' : '2ª';
      msg = g + '! ⚡ Hoje é Epic Universe — ' + visita + ' visita!\n\nO parque mais novo da Universal. Para o Be: Nintendo World (Mario Kart, Yoshi) e Isle of Berk (Toothless animatrônico).\n\nLembrete: sem Early Entry (Monreale). Dragon Racer\'s Rally NÃO aceita Express Pass — faça cedo!\n\nQuer o roteiro completo?';
    } else if (park && park !== 'Rest Day' && park !== 'Chegada' && park !== 'Troca de Hotel') {
      msg = g + '! 🎢 Família Hoppe, hoje é dia de ' + park + '.\n\nEstou aqui para filas ao vivo, roteiro otimizado, hacks e imprevistos.\n\nQuer o briefing completo do dia?';
    } else {
      msg = g + '! 🎢 Guia da Família Hoppe — Florida 2026 ativo.\n\nRoteiro completo carregado: parques, must-haves, perfil do Be, alturas corretas, hacks e Universal do zero.\n\nComo posso ajudar, Fernando?';
    }
    addMsg('agent', msg);
  }, 300);
};

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function getParkToday() {
  var p = PARKS[getToday()];
  if (!p || p === 'Rest Day' || p === 'Chegada' || p === 'Troca de Hotel' || p === 'Chef Mickey Breakfast' || p === 'Disney BoardWalk') return null;
  return p;
}

function detectParkFromText(t) {
  var tl = t.toLowerCase();
  for (var pk in PARK_KEYWORDS) {
    var kws = PARK_KEYWORDS[pk];
    for (var i = 0; i < kws.length; i++) {
      if (tl.indexOf(kws[i]) >= 0) return pk;
    }
  }
  return null;
}

async function testWaits() {
  var park = getParkToday() || 'Hollywood Studios';
  addMsg('agent', '🔍 Testando API ao vivo para ' + park + '...');
  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: [{ role: 'user', content: 'teste' }],
        system: 'Responda apenas: ok',
        parkName: park,
        fetchWaits: true
      })
    });
    var json = await res.json();
    if (json.hasLiveData) {
      addMsg('agent', '✅ API funcionando! Dados ao vivo de ' + park + ' carregados. As filas estão sendo buscadas corretamente.', json.waitCard || null);
    } else {
      addMsg('agent', '⚠️ Backend conectou mas sem dados de ' + park + ' agora. A Queue Times pode estar com instabilidade temporária. Tente novamente em alguns minutos.');
    }
  } catch(e) {
    addMsg('agent', '❌ Erro ao testar: ' + e.message);
  }
}

async function send(txt) {
  if (busy) return;
  var inp = document.getElementById('inp');
  var t = txt !== undefined ? txt : inp.value.trim();
  if (!t) return;

  if (txt === undefined) {
    inp.value = '';
    inp.style.height = 'auto';
  }
  document.getElementById('sbtn').disabled = true;

  addMsg('user', t);
  setBusy(true);

  var park = getParkToday();
  var mentionedPark = detectParkFromText(t);
  var parkForWaits = mentionedPark || park;
  var shouldFetchWaits = /fila|espera|wait|queue|lotado|cheio|tempo de espera|quanto.*min|aberta agora|fechada agora/i.test(t) && !!parkForWaits;

  var msgs = chatHistory.slice(-12).concat([{ role: 'user', content: t }]);

  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: msgs,
        system: SYSTEM,
        parkName: shouldFetchWaits ? parkForWaits : null,
        fetchWaits: shouldFetchWaits
      })
    });

    var json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Erro ' + res.status);

    chatHistory.push({ role: 'user', content: t });
    chatHistory.push({ role: 'assistant', content: json.text });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

    setBusy(false);
    addMsg('agent', json.text, json.waitCard || null);

  } catch(err) {
    setBusy(false);
    addMsg('agent', 'Erro: ' + err.message + '\n\nVerifique a conexão e tente de novo.');
  }

  document.getElementById('sbtn').disabled = false;
}

function qa(t) { send(t); }

function addMsg(role, text, extra) {
  var container = document.getElementById('msgs');
  var div = document.createElement('div');
  div.className = 'msg ' + role;

  var av = document.createElement('div');
  av.className = 'av';
  av.textContent = role === 'agent' ? '🎢' : '👤';

  var mc = document.createElement('div');
  mc.className = 'mc';

  var bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.innerHTML = fmt(text);

  var ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  mc.appendChild(bbl);
  if (extra) {
    var ex = document.createElement('div');
    ex.innerHTML = extra;
    mc.appendChild(ex);
  }
  mc.appendChild(ts);
  div.appendChild(av);
  div.appendChild(mc);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function fmt(t) {
  if (!t) return '';
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

function setBusy(v) {
  busy = v;
  document.getElementById('dot').className = v ? 'busy' : '';
  document.getElementById('typ').className = v ? 'on' : '';
  if (v) document.getElementById('msgs').scrollTop = 999999;
}
</script>
