<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Florida 2026">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Florida 2026 · Co-Piloto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efe8;
    --text2: #9997a8;
    --text3: #5a5870;
    --accent: #6c63ff;
    --accent2: #9d97ff;
    --gold: #f5c842;
    --gold2: #fad96e;
    --green: #3ecf8e;
    --red: #f56565;
    --font: 'DM Sans', sans-serif;
    --mono: 'Space Mono', monospace;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

  /* HEADER */
  #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--gold)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header-info h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
  .header-info p { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; flex-shrink: 0; }
  #status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status-dot.thinking { background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* QUICK ACTIONS */
  #quick-actions { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; border-bottom: 1px solid var(--border); }
  #quick-actions::-webkit-scrollbar { display: none; }
  .quick-btn { display: flex; align-items: center; gap: 6px; padding: 7px 13px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 20px; color: var(--text2); font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
  .quick-btn:active { background: var(--bg3); transform: scale(0.97); }

  /* MESSAGES */
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* BUBBLES */
  .msg { display: flex; gap: 10px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 2px; }
  .msg.agent .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--gold)); }
  .msg.user .msg-avatar { background: var(--bg3); border: 1px solid var(--border2); }
  .msg-content { max-width: 82%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-content { align-items: flex-end; }
  .msg-bubble { padding: 11px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; }
  .msg.agent .msg-bubble { background: var(--bg2); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
  .msg.user .msg-bubble { background: var(--accent); border-bottom-right-radius: 4px; color: #fff; }
  .msg-bubble strong { color: var(--gold2); font-weight: 600; }
  .msg.user .msg-bubble strong { color: #fff; font-weight: 700; }
  .msg-time { font-size: 10px; color: var(--text3); font-family: var(--mono); padding: 0 4px; }

  /* WAIT CARD */
  .wait-card { background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; padding: 12px; margin-top: 8px; }
  .wait-card-title { font-size: 11px; font-weight: 700; color: var(--green); font-family: var(--mono); letter-spacing: 0.05em; margin-bottom: 10px; }
  .wait-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .wait-item:last-child { border-bottom: none; }
  .wait-badge { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
  .w-low { background: rgba(62,207,142,0.15); color: var(--green); }
  .w-med { background: rgba(245,200,66,0.15); color: var(--gold); }
  .w-high { background: rgba(245,101,101,0.15); color: var(--red); }
  .w-off { background: var(--bg2); color: var(--text3); }

  /* TYPING */
  #typing { display: none; align-items: center; gap: 10px; padding: 0 16px 8px; }
  #typing.visible { display: flex; }
  .typing-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .typing-bubble { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* INPUT */
  #input-area { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0; }
  #input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.2s; }
  #input-row:focus-within { border-color: var(--accent); }
  #input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 15px; resize: none; max-height: 120px; min-height: 24px; line-height: 1.5; }
  #input::placeholder { color: var(--text3); }
  #send-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; color: white; }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { background: var(--bg3); cursor: not-allowed; opacity: 0.5; }
  #send-btn svg { width: 16px; height: 16px; }

  /* ERROR BANNER */
  .error-banner { background: rgba(245,101,101,0.1); border: 1px solid rgba(245,101,101,0.3); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--red); margin: 8px 16px; }

  .day-banner { text-align: center; padding: 6px 0; font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-left">
      <div class="logo">🎢</div>
      <div class="header-info">
        <h1>Florida 2026</h1>
        <p id="header-sub">Co-Piloto · Be, Ju & Você</p>
      </div>
    </div>
    <div id="status-dot"></div>
  </div>

  <div id="quick-actions">
    <button class="quick-btn" onclick="qa('Quais são as filas agora no parque de hoje?')">⏱️ Filas agora</button>
    <button class="quick-btn" onclick="qa('Qual a próxima atração do roteiro?')">➡️ Próxima atração</button>
    <button class="quick-btn" onclick="qa('O Be está cansado agora, o que fazemos?')">😴 Be cansou</button>
    <button class="quick-btn" onclick="qa('Tem imprevistos ou reformas hoje?')">⚠️ Imprevistos</button>
    <button class="quick-btn" onclick="qa('Me dá um hack especial para o parque de hoje.')">🎯 Hack do dia</button>
    <button class="quick-btn" onclick="qa('Explica o Express Pass da Universal comparando com o Lightning Lane da Disney.')">🎟️ Universal 101</button>
    <button class="quick-btn" onclick="qa('Como faço isso no app My Disney Experience agora?')">📱 App Disney</button>
    <button class="quick-btn" onclick="qa('Uma atração importante quebrou. Recalcula o roteiro de hoje.')">🔄 Rota quebrou</button>
  </div>

  <div id="messages">
    <div class="day-banner">CO-PILOTO ATIVO · FLORIDA 2026</div>
  </div>

  <div id="typing">
    <div class="typing-avatar">🎢</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="input" placeholder="Pergunta qualquer coisa..." rows="1"></textarea>
      <button id="send-btn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const SYSTEM = `Você é o co-piloto de viagem da família para a viagem à Flórida 2026.

FAMÍLIA:
- Pai (usuário do app), Ju (mãe), Be (filho, 3 anos e meio, 97cm, carrinho)

PERFIL DO BE:
- AMA: Carros/McQueen (paixão absoluta), Star Wars, Mickey Roadster Racers, dinossauros, animais
- Leve desconforto com escuro/fechado mas não bloqueia — NUNCA filtrar atração por causa dele
- Para cada atração: informar restrição de altura real + se Kids Switch está disponível
- Sempre deixar os pais decidirem

PERFIL ADULTOS:
- Experientes em Disney (múltiplas visitas) — não explicar básico Disney
- Pouca experiência Universal — SEMPRE explicar Universal proativamente
- Comparar Universal com Disney: "Express Pass = Lightning Lane Single Pass, mas usa 1x por atração por dia"
- Ambos topam adrenalina total, fazem Kids Switch em tudo
- Ritmo intenso, acordam 7h, querem fazer TUDO

HOTÉIS E DATAS:
- 28/04–05/05: All Star Movies Resort (HOTEL DISNEY = Early Entry 30min antes em qualquer parque Disney)
- 05/05–14/05: Monreale Hotel (FORA = SEM Early Entry, roteiro muda)
- Ingressos Disney: 1 parque por dia (sem Park Hopper)
- Ingressos Universal: 14 dias com acesso aos 3 parques

CRONOGRAMA SUGERIDO:
- 28/04 (ter): Magic Kingdom — Early Entry ativo
- 29/04 (qua): Animal Kingdom — Early Entry ativo  
- 30/04 (qui): EPCOT — Early Entry ativo + Flower & Garden Festival
- 01/05 (sex): Hollywood Studios — Early Entry ativo
- 02/05 (sáb): Magic Kingdom (2ª visita) — Early Entry ativo
- 03/05 (dom): Universal Studios Florida
- 04/05 (seg): ⚔️ HOLLYWOOD STUDIOS — MAY THE 4TH (FIXO IMUTÁVEL)
- 05/05 (ter): Islands of Adventure
- 06/05 (qua): LEGOLAND (dia do Be)
- 07/05 (qui): Epic Universe
- 08/05 (sex): Animal Kingdom (2ª visita)
- 09/05 (sáb): EPCOT (2ª visita)
- 10/05 (dom): Universal Studios Florida (2ª visita)
- 11/05 (seg): Magic Kingdom (3ª visita)
- 12/05 (ter): Islands of Adventure (2ª visita)
- 13/05 (qua): Epic Universe (2ª visita)

MUST-HAVES ABSOLUTOS:
1. 04/05 Hollywood Studios MAY THE 4TH:
   - Savi's Workshop (sabre de luz) — RESERVA OBRIGATÓRIA no app My Disney Experience. Custo ~$299. Se não reservado ainda, ALERTAR URGENTEMENTE que precisa fazer agora (reservas abrem 60 dias antes = 03/03/2026 — já passou, verificar disponibilidade imediatamente)
   - McQueen's Racing Academy — Be vai ENLOUQUECER
   - Galaxy's Edge completo — Millennium Falcon, ambiente, comida
   
2. Magic Kingdom — Tony's Town Square Restaurant:
   - Almoço às 12h em ponto
   - PEDIR MESA NA VARANDA (Balcony View) ao fazer reserva e ao chegar
   - Para assistir o fim da Mickey's Magical Friendship Faire parade sentados com vista
   - Considerar deslocamento para chegar com 15min de antecedência
   - Reservar no app My Disney Experience, seção Dining, com 60 dias de antecedência

3. Epic Universe — Toadstool Café (Nintendo World): reservar com antecedência

MUST-HAVES SECUNDÁRIOS (prioridade alta):
- Test Track EPCOT (Be ama carro de corrida — momento mágico garantido)
- Millennium Falcon: Smugglers Run (Be pilota — 38" mínimo, deve atingir)
- Tomorrowland Speedway Magic Kingdom (Be "dirige" — momento mágico)
- Expedition Everest + Kids Switch
- Raptor Encounter Islands of Adventure (Be adora dinos — foto com raptor)
- Encontro com Toothless Epic Universe (animatrônico realista — Be vai amar)
- Yoshi's Adventure + Power-Up Bands Nintendo World
- Dragon Racer's Rally Epic Universe (Be controla asas do dragão)
- Na'vi River Journey (sem restrição, visual deslumbrante — pode reclamar do escuro mas vai adorar)
- McQueen's Racing Academy Hollywood Studios

LEGOLAND 06/05:
- Parque ideal para Be (público 2-12 anos)
- Prioridades: DUPLO Valley (crianças pequenas, Be pode fazer tudo), LEGO City, The Dragon coaster (32" mínimo)
- Chegada às 10h na abertura, saída ~17h
- Sem Early Entry para vocês

EPCOT BÔNUS:
- Flower & Garden Festival até 01/junho — topiários de Buzz, Woody, Simba e +60 personagens
- Butterfly Landing: borboletas pousam no Be (incluído no ingresso)
- Scavenger hunt Spike the Bee — perfeito para o Be
- Test Track: Be ama, prioridade máxima de manhã

HACKS QUE O AGENTE DEVE CONHECER E BUSCAR:
- Tony's 12h = parade view da varanda (o hack da família)
- Entrar pela esquerda no Magic Kingdom (Tomorrowland) = 40% menos fila
- Early Entry = primeiros 90min têm 40-60% menos fila
- Kids Switch: adulto 1 entra, sai, adulto 2 entra com passe sem fila
- Kali River Rapids = todos molham, levar roupa extra
- Buscar ATIVAMENTE hacks específicos do parque do dia antes de cada visita
- Em parques Disney lotados: fazer atrações ao ar livre de manhã, indoor de tarde (chuvas 14-16h)
- No Universal: chegar cedo no Epic Universe (1 ano aberto, filas ainda imprevisíveis)

REGRAS CRÍTICAS:
1. NUNCA filtrar atração por ser pequeno/jovem — só informar altura mínima e deixar decidir
2. Be AMA McQueen — qualquer menção a carros/corrida é prioridade emocional máxima
3. May the 4th = Hollywood Studios FIXO, não mover por nada
4. Savi's Workshop = alertar urgência se não confirmado
5. Early Entry só funciona até 05/05 (All Star Movies)
6. Universal: explicar tudo proativamente, nunca assumir que sabem
7. Se atração quebrar: recalcular rota imediatamente com alternativas concretas
8. Incluir instrução do app (Disney Experience ou Universal) quando relevante
9. Considerar carrinho do Be em deslocamentos e filas

CLIMA ORLANDO MAIO: 27-32°C, úmido. Chuvas rápidas 14-16h. Indoor de tarde.

RESPONDA SEMPRE:
- Português do Brasil
- Direto e prático, sem introduções longas
- Próxima ação concreta primeiro
- Máximo 4 parágrafos (tela de celular)
- Emojis moderados para escaneamento rápido`;

let history = [];
let busy = false;

// AUTO-RESIZE TEXTAREA
const input = document.getElementById('input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = input.value.trim() === '' || busy;
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!busy) send(); }
});

// INIT
window.addEventListener('load', () => {
  setStatus('online');
  detectDay();
  welcome();
});

function detectDay() {
  const today = new Date().toISOString().split('T')[0];
  const map = {
    '2026-04-28': 'Magic Kingdom', '2026-04-29': 'Animal Kingdom',
    '2026-04-30': 'EPCOT', '2026-05-01': 'Hollywood Studios',
    '2026-05-02': 'Magic Kingdom', '2026-05-03': 'Universal Studios Florida',
    '2026-05-04': 'Hollywood Studios ⚔️', '2026-05-05': 'Islands of Adventure',
    '2026-05-06': 'Legoland 🧱', '2026-05-07': 'Epic Universe',
    '2026-05-08': 'Animal Kingdom', '2026-05-09': 'EPCOT',
    '2026-05-10': 'Universal Studios', '2026-05-11': 'Magic Kingdom',
    '2026-05-12': 'Islands of Adventure', '2026-05-13': 'Epic Universe',
  };
  const park = map[today];
  if (park) document.getElementById('header-sub').textContent = park + ' · Be, Ju & Você';
}

function welcome() {
  const today = new Date().toISOString().split('T')[0];
  let msg;
  if (today === '2026-05-04') {
    msg = `⚔️ **MAY THE 4TH BE WITH YOU!**\n\nHoje é o dia mais especial da viagem — Hollywood Studios está esperando vocês.\n\n**Checklist urgente de hoje:**\n• Savi's Workshop: horário reservado?\n• McQueen's Racing Academy: primeiro horário disponível\n• Galaxy's Edge: rope drop é obrigatório\n\nO que posso ajudar agora?`;
  } else if (today === '2026-05-06') {
    msg = `🧱 **Dia do Be no Legoland!**\n\nO parque foi feito pra ele — hoje é dia de Be ser o rei.\n\n**Prioridades:** DUPLO Valley primeiro (crianças pequenas), depois LEGO City e The Dragon. Chegada na abertura às 10h.\n\nQuer o briefing completo?`;
  } else {
    const h = new Date().getHours();
    const g = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
    msg = `${g}! 🎢 Co-Piloto ativo.\n\nEstou aqui para filas, roteiro, hacks, imprevistos e tudo da Universal que precisarem. Use os botões acima ou pergunta qualquer coisa.\n\nQuer o briefing do dia de hoje?`;
  }
  addMsg('agent', msg);
}

// FETCH FILAS
async function getWaits(parkName) {
  const slugs = {
    'Magic Kingdom': '6', 'EPCOT': '5', 'Hollywood Studios': '7',
    'Animal Kingdom': '8', 'Universal Studios Florida': '13',
    'Islands of Adventure': '14', 'Epic Universe': '687',
    'Legoland': '13261',
  };
  const id = Object.keys(slugs).find(k => parkName.includes(k.split(' ')[0]));
  if (!id) return null;
  try {
    const r = await fetch(`https://queue-times.com/parks/${slugs[id]}/queue_times.json`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function waitCard(data, parkName) {
  if (!data?.lands) return '';
  const rides = data.lands.flatMap(l => l.rides.map(r => ({ ...r, land: l.name })));
  rides.sort((a, b) => (b.is_open - a.is_open) || (b.wait_time - a.wait_time));
  const top = rides.slice(0, 10);
  let html = `<div class="wait-card"><div class="wait-card-title">● AO VIVO — ${parkName} · ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>`;
  for (const r of top) {
    const cls = !r.is_open ? 'w-off' : r.wait_time <= 20 ? 'w-low' : r.wait_time <= 45 ? 'w-med' : 'w-high';
    const wt = !r.is_open ? 'Fechada' : r.wait_time === 0 ? 'Walk-in' : `${r.wait_time}min`;
    html += `<div class="wait-item"><span>${r.name}</span><span class="wait-badge ${cls}">${wt}</span></div>`;
  }
  return html + '</div>';
}

function waitSummary(data) {
  if (!data?.lands) return '';
  return data.lands.flatMap(l => l.rides.map(r =>
    `${r.name}: ${!r.is_open ? 'FECHADA' : r.wait_time === 0 ? 'Walk-in' : r.wait_time + 'min'}`
  )).join('\n');
}

// ENVIAR
async function send(text) {
  if (busy) return;
  const t = text || input.value.trim();
  if (!t) return;
  if (!text) { input.value = ''; input.style.height = 'auto'; }
  document.getElementById('send-btn').disabled = true;

  addMsg('user', t);
  setStatus('thinking');
  showTyping(true);

  // Detectar parque atual pela data
  const today = new Date().toISOString().split('T')[0];
  const parkMap = {
    '2026-04-28':'Magic Kingdom','2026-04-29':'Animal Kingdom','2026-04-30':'EPCOT',
    '2026-05-01':'Hollywood Studios','2026-05-02':'Magic Kingdom','2026-05-03':'Universal Studios Florida',
    '2026-05-04':'Hollywood Studios','2026-05-05':'Islands of Adventure','2026-05-06':'Legoland',
    '2026-05-07':'Epic Universe','2026-05-08':'Animal Kingdom','2026-05-09':'EPCOT',
    '2026-05-10':'Universal Studios Florida','2026-05-11':'Magic Kingdom',
    '2026-05-12':'Islands of Adventure','2026-05-13':'Epic Universe',
  };
  const park = parkMap[today];

  // Buscar filas se relevante
  let liveCtx = '';
  let cardHtml = '';
  if (/fila|espera|wait|tempo|queue|quanto/i.test(t) && park) {
    const data = await getWaits(park);
    if (data) {
      liveCtx = `\n\n[DADOS AO VIVO — ${park} às ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}]\n${waitSummary(data)}`;
      cardHtml = waitCard(data, park);
    }
  }

  // Montar histórico
  const msgs = [
    ...history.slice(-12),
    { role: 'user', content: t + liveCtx }
  ];

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs, system: SYSTEM })
    });

    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Erro no servidor');

    const reply = json.text;
    history.push({ role: 'user', content: t });
    history.push({ role: 'assistant', content: reply });
    if (history.length > 24) history = history.slice(-24);

    showTyping(false);
    setStatus('online');
    addMsg('agent', reply, cardHtml);

  } catch (err) {
    showTyping(false);
    setStatus('online');
    addMsg('agent', `⚠️ Erro ao responder: ${err.message}\n\nVerifique sua conexão e tente novamente.`);
  }

  document.getElementById('send-btn').disabled = false;
}

function qa(t) { send(t); }

// UI
function addMsg(role, text, extra) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'agent' ? '🎢' : '👤';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = fmt(text);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  content.appendChild(bubble);
  if (extra) { const e = document.createElement('div'); e.innerHTML = extra; content.appendChild(e); }
  content.appendChild(time);
  div.appendChild(av);
  div.appendChild(content);

  container.insertBefore(div, document.getElementById('typing'));
  container.scrollTop = container.scrollHeight;
}

function fmt(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg3);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:12px">$1</code>')
    .replace(/\n/g,'<br>');
}

function showTyping(v) {
  document.getElementById('typing').className = v ? 'visible' : '';
  if (v) document.getElementById('messages').scrollTop = 999999;
}

function setStatus(s) {
  busy = s === 'thinking';
  document.getElementById('status-dot').className = s;
}
</script>
